name: PR Tests

on:
  pull_request:
    branches: [main, master]

  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Run tests
        run: mvn test --batch-mode
        continue-on-error: true

      - name: Parse test results
        id: results
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import glob
          import os

          total = passed = failed = skipped = 0

          for xml_file in glob.glob('target/surefire-reports/TEST-*.xml'):
              root = ET.parse(xml_file).getroot()
              total   += int(root.get('tests',    0))
              failed  += int(root.get('failures', 0)) + int(root.get('errors', 0))
              skipped += int(root.get('skipped',  0))

          passed     = total - failed - skipped
          percentage = round(passed * 100 / total, 1) if total > 0 else 0.0

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'total={total}\n')
              f.write(f'passed={passed}\n')
              f.write(f'failed={failed}\n')
              f.write(f'skipped={skipped}\n')
              f.write(f'percentage={percentage}\n')
          EOF

      - name: Post test report comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const total      = Number('${{ steps.results.outputs.total }}')      || 0;
            const passed     = Number('${{ steps.results.outputs.passed }}')     || 0;
            const failed     = Number('${{ steps.results.outputs.failed }}')     || 0;
            const skipped    = Number('${{ steps.results.outputs.skipped }}')    || 0;
            const percentage = '${{ steps.results.outputs.percentage }}'         || '0';

            const icon       = total === 0 ? '⚠️' : failed === 0 ? '✅' : '❌';
            const statusText = total === 0
              ? 'No test results found — build may have failed before tests ran.'
              : failed === 0
                ? 'All tests passed!'
                : `${failed} test(s) failed.`;

            const marker = '<!-- pr-test-report -->';
            const body = [
              marker,
              `## ${icon} Test Report`,
              '',
              `**${statusText}**`,
              '',
              '| Metric | Count |',
              '|---|---|',
              `| Total Tests | ${total} |`,
              `| ✅ Passed   | ${passed} |`,
              `| ❌ Failed   | ${failed} |`,
              `| ⏭️ Skipped  | ${skipped} |`,
              `| 📊 Pass Rate | ${percentage}% |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
